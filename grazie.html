<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accesso</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
color:white;
overflow:hidden;
transition:.5s;
}

.container{
text-align:center;
padding:20px;
}

h1{
font-size:32px;
letter-spacing:3px;
text-transform:uppercase;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
opacity:.6;
transform:scale(.98);
}

50%{
opacity:1;
transform:scale(1);
}

100%{
opacity:.6;
transform:scale(.98);
}

}

.moon{
background:#0a2cff;
box-shadow: inset 0 0 200px rgba(0,180,255,.9);
}

.res{
background:#ff0000;
box-shadow: inset 0 0 200px rgba(255,0,0,.9);
}

body::before{

content:"";
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
background:radial-gradient(circle,rgba(255,255,255,.15),transparent);
animation:flash 2s infinite;

}

@keyframes flash{

0%{opacity:.2;}
50%{opacity:.7;}
100%{opacity:.2;}

}

</style>

</head>

<body>

<div class="container">

<h1 id="text"></h1>

</div>

<script>

// Legge la fazione salvata nel browser
const faction = localStorage.getItem("vote");

const text = document.getElementById("text");

if(faction === "moon"){

    document.body.classList.add("moon");
    text.innerHTML = "BENVENUTO<br>NELLA<br>MOONLABYTE";

}
else if(faction === "res"){

    document.body.classList.add("res");
    text.innerHTML = "BENVENUTO<br>NELLA<br>RESISTENZA";

}
else{

    // Se nessuno ha votato torna alla home
    window.location.href = "index.html";

}

</script>

</body>
</html>
