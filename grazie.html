<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    color:white;
    overflow:hidden;
    position:relative;
    transition:.5s;
}

.container{
    text-align:center;
    max-width:700px;
    padding:40px 20px;
    z-index:2;
}

h1{
    font-size:52px;
    text-transform:uppercase;
    letter-spacing:2px;
    margin-bottom:35px;
    animation:pulse 1.8s infinite;
}

.subtitle{
    font-size:24px;
    line-height:1.5;
    margin-bottom:35px;
}

.social-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.social-buttons a{

    display:inline-block;
    min-width:180px;
    padding:16px 28px;

    color:white;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;

    border:2px solid rgba(255,255,255,.8);
    border-radius:10px;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(8px);

    transition:.25s;

}

.social-buttons a:hover{

    background:white;
    color:black;
    transform:scale(1.05);

}

.moon{
    background:#0058ff;
    box-shadow: inset 0 0 220px rgba(0,200,255,.9);
}

.res{
    background:#ff0000;
    box-shadow: inset 0 0 220px rgba(255,0,0,.9);
}

body::before{

    content:"";
    position:absolute;
    inset:0;

    background:radial-gradient(circle,
        rgba(255,255,255,.18),
        transparent 70%);

    animation:flash 2s infinite;

}

@keyframes pulse{

0%{
opacity:.7;
transform:scale(.98);
}

50%{
opacity:1;
transform:scale(1);
}

100%{
opacity:.7;
transform:scale(.98);
}

}

@keyframes flash{

0%{opacity:.25;}
50%{opacity:.75;}
100%{opacity:.25;}

}

</style>

</head>

<body>

<div class="container">

<h1 id="title"></h1>

<div class="subtitle">
    Stay tuned for the results by following us on
</div>

<div class="social-buttons">

<a href="https://www.instagram.com/moonlabyte/?hl=it"
target="_blank"
rel="noopener noreferrer">
Instagram
</a>

<a href="https://www.facebook.com/profile.php?id=100087796418761"
target="_blank"
rel="noopener noreferrer">
Facebook
</a>

</div>

</div>

<script>

const faction = localStorage.getItem("vote");

const title = document.getElementById("title");

if(faction === "moon"){

    document.body.classList.add("moon");
    title.innerHTML = "Welcome to<br>Moonlabyte";

}
else if(faction === "res"){

    document.body.classList.add("res");
    title.innerHTML = "You are one with<br>the Resistence";

}
else{

    window.location.href = "index.html";

}

</script>

</body>
</html>
