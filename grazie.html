<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accesso</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family: Arial, sans-serif;
color:white;
overflow:hidden;
transition:0.5s;
}

.container{
text-align:center;
z-index:2;
}

h1{
font-size:28px;
letter-spacing:2px;
text-transform:uppercase;
}

.glow{
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:0.6;}
50%{opacity:1;}
100%{opacity:0.6;}
}

/* MOONLABYTE */
.moon{
background:#0a2cff;
box-shadow: inset 0 0 120px rgba(0,150,255,0.8);
}

/* RESISTENZA */
.res{
background:#ff0000;
box-shadow: inset 0 0 120px rgba(255,0,0,0.8);
}

/* effetto "energia" */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(255,255,255,0.15), transparent);
animation:flash 2s infinite;
}

@keyframes flash{
0%{opacity:0.2;}
50%{opacity:0.6;}
100%{opacity:0.2;}
}

</style>

</head>

<body>

<div class="container">
    <h1 id="text" class="glow"></h1>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const faction = params.get("faction");

const body = document.body;
const text = document.getElementById("text");

if(faction === "moon"){
    body.classList.add("moon");
    text.innerText = "BENVENUTO NELLA MOONLABYTE";
}

if(faction === "res"){
    body.classList.add("res");
    text.innerText = "BENVENUTO NELLA RESISTENZA";
}

</script>

</body>
</html>
