<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moonlabyte Vote</title>

<link rel="stylesheet" href="assets/css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="title">
    <h1>WHO WILL YOU SUPPORT?</h1>
    <p>Choose your faction</p>
</div>

<div class="center-line"></div>

<div class="split">

    <!-- ===================== -->
    <!-- MOONLABYTE -->
    <!-- ===================== -->

    <section class="side moon">

        <button onclick="vote('moon')" class="btn moon-btn">
            VOTE
        </button>

        <div class="faction-info">

            <img
                src="assets/images/moonlabyte.png"
                alt="Moonlabyte"
                class="logo">

            <h2>MOONLABYTE CORP.</h2>

        </div>

    </section>


    <!-- ===================== -->
    <!-- RESISTENZA -->
    <!-- ===================== -->

    <section class="side res">

        <button onclick="vote('res')" class="btn res-btn">
            VOTE
        </button>

        <div class="faction-info">

            <img
                src="assets/images/resistenza.png"
                alt="Resistenza"
                class="logo">

            <h2>RESISTANCE ARMY</h2>

        </div>

    </section>

</div>

<script>

const savedFaction = localStorage.getItem("vote");

if(savedFaction){

    window.location.href = "grazie.html?faction=" + savedFaction;

}

</script>

<script src="assets/js/script.js"></script>

</body>

</html>
